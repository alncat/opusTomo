# =============================================================================
# WARP → AreTomo2 → PyTOM → OPUS-ET Pipeline — Tilt-Series Configuration
# =============================================================================
# Shared by all species/templates for this dataset. Source first, then source a
# species.conf on top. SCRIPT_DIR resolves to the skill root (set via SKILL_DIR
# from sbatch, or derived from the script's location). From any SLURM script:
#   SCRIPT_DIR="${SKILL_DIR:-$(cd "$(dirname "$0")/.." && pwd)}"
#   source "${SCRIPT_DIR}/pipeline.conf"
#   source "${SCRIPT_DIR}/species.conf"
# =============================================================================

# -----------------------------------------------------------------------------
# Environment paths — verify before submitting
# -----------------------------------------------------------------------------
WORK_DIR="/path/to/your/project"
WARP_DIR="/path/to/warp/Release/linux-x64/publish"
CONDA_LIB="/path/to/conda/envs/warp_build/lib"

WARP_ENV="warp_build"
OPUSET_ENV="opuset_env"
PYTOM_ENV="pytom_env"

ARETOMO_EXE="/path/to/AreTomo2/AreTomo2"

# -----------------------------------------------------------------------------
# Cluster — verify with: sinfo -s, sinfo -o "%G"
# -----------------------------------------------------------------------------
CPU_PARTITION="normal"
GPU_PARTITION="normal"
GRES_GPU="gpu:4"
NUM_GPUS=4
MODULE_CUDA="cuda12.3"
MODULE_COMPILER="gnu8"

# -----------------------------------------------------------------------------
# Microscope & detector
# -----------------------------------------------------------------------------
ANGPIX="3.37"
EXPOSURE="2.36"
CTF_RANGE_MAX=7                          # must be ≥ 2×ANGPIX

# Frames
FRAME_DIR="frames/"
FILE_EXTENSION="*.mrc"
FRAME_MODE="single"                      # single | movie | eer
GAIN_FILE=""                             # gain reference; leave empty if none
DEFECTS_FILE=""                          # optional bad-pixel map
EER_NGROUPS=""                           # EER only, e.g. 10

# CTF estimation
CTF_GRID="2x2x1"
CTF_DEFOCUS_MAX=8
CTF_WINDOW=512
MOTION_GRID="1x1x3"                      # for fractionated movies

# -----------------------------------------------------------------------------
# Tilt series
# -----------------------------------------------------------------------------
TOMO_DIM_X=""                            # detector cols (unbinned); blank = auto-detect
TOMO_DIM_Y=""                            # detector rows (unbinned); blank = auto-detect
TOMO_DIM_Z=2000                          # upper bound on sample thickness (unbinned px)
BINNING_FACTOR=4                         # for ts_stack export and AreTomo
ALIGN_ANGPIX=""                          # derived below; leave blank

SAMPLE_FRAME=""                          # MRC for auto-detecting X/Y; blank = first under average/
MIN_INTENSITY=0.3

# -----------------------------------------------------------------------------
# Subtomogram export — species-specific OUTPUT_ANGPIX lives in species.conf
# -----------------------------------------------------------------------------
COORDS_ANGPIX="$ANGPIX"                  # coordinate pixel size = unbinned ANGPIX

# -----------------------------------------------------------------------------
# M refinement (optional — shared population/source, species below in species.conf)
# -----------------------------------------------------------------------------
POPULATION_NAME="population1"
SOURCE_NAME="source1"
REFINE_IMAGEWARP="4x4"

# Optional checks
VALIDATE_M_REFINEMENT=0                  # 1 = also require warp_m_* script placeholders to be filled

# =============================================================================
# Derived — computed from values above; do NOT edit manually
# =============================================================================

# ALIGN_ANGPIX = ANGPIX × BINNING_FACTOR
if [ -z "$ALIGN_ANGPIX" ]; then
    ALIGN_ANGPIX=$(awk "BEGIN {printf \"%.6f\", $ANGPIX * $BINNING_FACTOR}")
fi

# Shared directory paths — not species-specific
TILTSERIES_SETTINGS="$WORK_DIR/warp_tiltseries.settings"
TILTSTACK_DIR="$WORK_DIR/warp_tiltseries/tiltstack"
TOMOSTAR_DIR="$WORK_DIR/tomostar"
FRAMESERIES_DIR="$WORK_DIR/warp_frameseries"
PROCESSING_DIR="$WORK_DIR/warp_tiltseries"
MDOC_DIR="$WORK_DIR/mdoc"
TEMPLATES_DIR="$WORK_DIR/templates"
# DATADIR (subtomo export dir) defined in species.conf — different species may use different subdirs
