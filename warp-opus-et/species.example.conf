# =============================================================================
# Species-Specific Configuration
# =============================================================================
# Source AFTER pipeline.conf. One file per species (e.g. species_ribo.conf,
# species_26s.conf). Pick the right one when running Phase 6–8.
#
#   source "${SCRIPT_DIR}/pipeline.conf"
#   source "${SCRIPT_DIR}/species_ribo.conf"
#
# === User MUST fill: ===========================================================
#   TM_LABEL, DIAMETER, INPUT_MRC, MAP_ANGPIX, OUTPUT_ANGPIX, SUBTOMO_BOX_SIZE
#   TM_SPLIT_X, TM_SPLIT_Y, TM_SPLIT_Z, M_PARTICLES_STAR (for M refinement)
# === Agent derives: ============================================================
#   TM_BOX_SIZE from DIAMETER / 0.75 / ALIGN_ANGPIX, rounded to even
#   SUBTOMO_BOX_SIZE from DIAMETER / 0.75 / OUTPUT_ANGPIX, rounded to even
#   MASK_RADIUS from DIAMETER / 2 / ALIGN_ANGPIX (both sphere mask and extraction)
# === Advanced (defaults work, tune if needed): =================================
#   MASK_SIGMA, EXTRACT_MASK_RADIUS, training mask morph params
# =============================================================================

# -----------------------------------------------------------------------------
# Species identity — user MUST set
# -----------------------------------------------------------------------------
TM_LABEL="ribo"                          # namespace for this species/template
DIAMETER=320                             # particle diameter in Å
TM_BOX_SIZE=32                           # TM template/mask box at ALIGN_ANGPIX
OUTPUT_ANGPIX="2.5"                     # exported subtomogram pixel size (user choice)
SUBTOMO_BOX_SIZE=128                     # exported subtomogram box at OUTPUT_ANGPIX
DATADIR="$WORK_DIR/warp_tiltseries/subtomo"  # subtomogram export dir; change per species (e.g. subtomo_ribo)
DOWNSAMPLE_FRAC="1."                     # OPUS-ET encoder downsample fraction; 1. = no downsampling
TEMPLATERES=128                          # OPUS-ET decoder output size; ~ SUBTOMO_BOX_SIZE × DOWNSAMPLE_FRAC / 0.75

# -----------------------------------------------------------------------------
# Template generation (gen_template_from_mrc.slurm) — user MUST set INPUT_MRC, MAP_ANGPIX
# -----------------------------------------------------------------------------
INPUT_MRC="/path/to/source/template.mrc" # user-provided source template map
MAP_ANGPIX="1.5"                         # pixel size of INPUT_MRC
LPF_RESOLUTION=""                        # blank = PyTom default
TEMPLATE_INVERT=0                        # 1 = invert contrast (neg stain → positive)
TEMPLATE_MIRROR=0                        # 1 = mirror/flip handedness

# -----------------------------------------------------------------------------
# TM sphere mask (gen_sphere_mask.slurm) — MASK_RADIUS is derived, user sets MASK_SIGMA
# -----------------------------------------------------------------------------
MASK_RADIUS=11                           # sphere mask radius in pixels at ALIGN_ANGPIX
MASK_SIGMA=1                             # edge softness in pixels

# -----------------------------------------------------------------------------
# Template matching jobs (gen_tm_jobs_aretomo.slurm + run_tm_sequential.slurm)
# -----------------------------------------------------------------------------
SEARCH_REGION=""                         # empty = full X/Y with z_start=20
DEFAULT_Z_START=20
ANGLE_LIST="angles_12.85_7112.em"
TM_SPLIT_X=2                             # GPU volume split across X for TM
TM_SPLIT_Y=2                             # GPU volume split across Y for TM
TM_SPLIT_Z=1                             # GPU volume split across Z for TM

# -----------------------------------------------------------------------------
# TM extraction (extract_tm_candidates_parallel.slurm)
# -----------------------------------------------------------------------------
NUM_CANDIDATES=5000                      # top-N peaks per TS (over-pick, filter by score)
EXTRACT_MASK_RADIUS=14                   # non-max suppression radius (larger than sphere MASK_RADIUS)
TEMPLATE="${TM_LABEL}_tm"                 # PyTom reference suffix (scores_<TEMPLATE>.em)
MIN_SCORE=0.0

# -----------------------------------------------------------------------------
# OPUS-ET training (train_opuset.slurm, train_opuset_fixed.slurm) — advanced
# -----------------------------------------------------------------------------
ZDIM=12
ZAFFINEDIM=4
OUTPUT_DIR="opuset/${TM_LABEL}/z${ZDIM}"  # relative to WORK_DIR; species + latent dim namespaced
NUM_EPOCHS=40
BATCH_SIZE=12
LEARNING_RATE="4.5e-5"
BETA_CONTROL=0.5
LAMB=0.5
BFACTOR=3.75
VAL_FRAC=0.1
TILT_RANGE=""                            # blank = auto-detect from .tlt files
TILT_STEP=""                             # blank = auto-detect from .tlt files
FIXED_SUBSET_LABEL=1                     # fixed-mode half-map subset; rerun with 2 for subset2

# -----------------------------------------------------------------------------
# Training mask (gen_training_mask.slurm) — advanced, defaults work for most cases
# -----------------------------------------------------------------------------
AUTO_CREATE_TRAINING_MASK=1
MASK_RADIUS_FRACTION=0.85                # sphere radius as fraction of min box dim / 2
MASK_SOFT_EDGE=2                         # soft edge width in voxels
SUBTOMO_GLOB="*.mrc"                     # glob for input subtomograms
# Morphological post-processing (sphere mode only):
TRAINING_MASK_DILATE=3                   # binary dilation iterations
TRAINING_MASK_CLOSE=1                    # binary closing iterations
TRAINING_MASK_OPEN=0                     # binary opening iterations
TRAINING_MASK_ERODE=0                    # binary erosion iterations
TRAINING_MASK_FILL_HOLES=1               # 1 = fill holes in binary mask
TRAINING_MASK_LARGEST_COMPONENT=1        # 1 = keep only largest connected component

# -----------------------------------------------------------------------------
# M refinement — species-specific (warp_m_create_species.slurm et al.)
# -----------------------------------------------------------------------------
SPECIES_BASE="$TM_LABEL"                 # species name without WARP's _<hash> suffix
SYM="C1"
LOWPASS="15"
ANGPIX_RESAMPLE="$ANGPIX"                # MCore working pixel size; default = unbinned ANGPIX, set coarser for speed
M_HALF1="$WORK_DIR/opuset/$TM_LABEL/half1.mrc"  # from Phase 8d prepare_m_halfmaps
M_HALF2="$WORK_DIR/opuset/$TM_LABEL/half2.mrc"  # from Phase 8d
M_MASK="$WORK_DIR/opuset/$TM_LABEL/halfmap_mask.mrc"  # from Phase 8d (or custom)
M_PARTICLES_STAR="/path/to/particles_relion.star"  # RELION-format particle STAR for M refinement; user MUST set
M_MASK_THRESHOLD=""                      # density threshold for MTools update_mask
M_HALFMAP_THRESHOLD=""                   # density threshold for half-map mask (Phase 8d)

# =============================================================================
# Derived species-specific paths — do NOT edit manually
# =============================================================================
TM_JOBS_DIR="$WORK_DIR/template_matching/$TM_LABEL/jobs"
TM_PARTICLES_DIR="$WORK_DIR/template_matching/$TM_LABEL/particles"
TM_STAR_DIR="$WORK_DIR/template_matching/$TM_LABEL/star_files"
TM_WARP_DIR="$WORK_DIR/template_matching/$TM_LABEL/warp_star"
OPUSET_OUT_DIR="$WORK_DIR/opuset/$TM_LABEL/z${ZDIM}"

TEMPLATE_MRC="$TEMPLATES_DIR/${TM_LABEL}_tm.mrc"
TM_MASK_MRC="$TEMPLATES_DIR/${TM_LABEL}_mask.mrc"
TRAINING_MASK_MRC="$TEMPLATES_DIR/${TM_LABEL}_training_mask.mrc"
EXPORT_STAR="$WORK_DIR/warp_tiltseries/${TM_LABEL}_matching.star"
